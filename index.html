<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>
Goldnet Dashboard
</title>

<style>

body{

background:#08111F;
color:white;
font-family:Arial;
padding:30px;

}

.card{

background:#132238;
padding:20px;
border-radius:15px;
margin-bottom:20px;

}

.big{

font-size:32px;
font-weight:bold;

}

input{

padding:12px;
width:600px;
border:none;
border-radius:10px;

}

button{

padding:12px 20px;
background:#2EA8FF;
border:none;
color:white;
border-radius:10px;
cursor:pointer;

}

</style>

</head>

<body>

<h1>
Goldnet Financial Dashboard
</h1>

<div class="card">

<input
id="csv"
placeholder="Paste CSV Link"
/>

<button
onclick="load()"
>

Load Data

</button>

</div>

<div id="dashboard">

</div>

<script>

function vnd(x){

return new Intl
.NumberFormat(

"vi-VN",

{

style:"currency",

currency:"VND"

}

)

.format(x)

}

function num(x){

return Number(

String(x)

.replaceAll(".","")

.replaceAll(",","")

)||0

}

async function load(){

const url=

document
.getElementById(
"csv"
)
.value

const raw=

await fetch(
url
)

const csv=

await raw.text()

const lines=

csv
.split("\n")

const headers=

lines[0]
.split(",")

const rows=

lines
.slice(1)

.map(x=>{

const obj={}

x
.split(",")

.forEach(

(v,i)=>{

obj[
headers[i]
]

=v

}

)

return obj

})

const revenue=

rows.reduce(

(a,b)=>

a+

num(

b[
"Value (Chưa VAT)"
]

)

,0

)

const cash=

rows

.filter(

x=>

x[
"Payment Status"
]

?.includes(

"thanh toán"

)

)

.reduce(

(a,b)=>

a+

num(

b[
"Value (Chưa VAT)"
]

)

,0

)

document

.getElementById(
"dashboard"
)

.innerHTML=

`

<div class="card">

Revenue

<div class="big">

${vnd(revenue)}

</div>

</div>

<div class="card">

Cash In

<div class="big">

${vnd(cash)}

</div>

</div>

<div class="card">

Outstanding AR

<div class="big">

${vnd(
revenue-cash
)}

</div>

</div>

`

}

</script>

</body>

</html>
